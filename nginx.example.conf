# 复制到服务器: /etc/nginx/sites-available/zytb
# 然后: sudo ln -s /etc/nginx/sites-available/zytb /etc/nginx/sites-enabled/
# 修改 server_name 为你的真实域名

# HTTP → HTTPS 重定向（配置 SSL 证书后启用）
# server {
#     listen 80;
#     server_name renxiangsan.com www.renxiangsan.com;
#     return 301 https://www.renxiangsan.com$request_uri;
# }

server {
    listen 80;
    server_name renxiangsan.com www.renxiangsan.com;

    # 启用 gzip 压缩，提升 PageSpeed 得分
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # 静态资源缓存
    location ~* \.(css|js|svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

