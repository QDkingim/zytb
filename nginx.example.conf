# 生产环境 HTTPS 配置
# 复制: sudo cp nginx.example.conf /etc/nginx/sites-available/zytb
# 启用: sudo ln -sf /etc/nginx/sites-available/zytb /etc/nginx/sites-enabled/
# 测试: sudo nginx -t && sudo systemctl reload nginx
#
# 首次申请证书请先用 nginx.bootstrap.conf，再运行 scripts/setup-ssl.sh

# ── HTTP：ACME 验证 + 强制跳转 HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name renxiangsan.com www.renxiangsan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.renxiangsan.com$request_uri;
    }
}

# ── HTTPS：裸域名 → www ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name renxiangsan.com;

    ssl_certificate     /etc/letsencrypt/live/renxiangsan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renxiangsan.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.renxiangsan.com$request_uri;
}

# ── HTTPS：主站 ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.renxiangsan.com;

    ssl_certificate     /etc/letsencrypt/live/renxiangsan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renxiangsan.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~* \.(css|js|svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
