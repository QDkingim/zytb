# 首次申请 SSL 证书时使用（证书就绪前不要启用 nginx.example.conf）
# 复制: sudo cp nginx.bootstrap.conf /etc/nginx/sites-available/zytb
# 启用: sudo ln -sf /etc/nginx/sites-available/zytb /etc/nginx/sites-enabled/
# 测试: sudo nginx -t && sudo systemctl reload nginx
# 然后: sudo bash scripts/setup-ssl.sh

server {
    listen 80;
    listen [::]:80;
    server_name renxiangsan.com www.renxiangsan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
